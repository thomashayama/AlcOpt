services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    volumes:
      - ./data:/app/data
    env_file: .env
    restart: unless-stopped
    networks:
      - thomashayama-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - 3000:3000
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - thomashayama-net

  backend-dev:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - 8000:8000
    volumes:
      - ./backend:/app
      - ./data:/app/data
    env_file: .env
    command: ["uv", "run", "uvicorn", "alcopt.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    restart: unless-stopped
    networks:
      - thomashayama-net

networks:
  thomashayama-net:
    driver: bridge
    external: true
